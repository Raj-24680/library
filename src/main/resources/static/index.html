<!DOCTYPE html>
<html>
<head>
<title>Library Management System</title>

<!-- Bootstrap CSS -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

<h1 class="text-center text-primary mb-4">Library Management System</h1>

<div class="card p-4 shadow">

<div class="row mb-3">

<div class="col-md-3">
<button class="btn btn-success w-100" onclick="loadBooks()">Show Books</button>
</div>

<div class="col-md-3">
<input type="number" id="bookId" class="form-control" placeholder="Book ID">
</div>

<div class="col-md-3">
<button class="btn btn-warning w-100" onclick="issueBook()">Issue Book</button>
</div>

<div class="col-md-3">
<button class="btn btn-info w-100" onclick="returnBook()">Return Book</button>
</div>

</div>

</div>

<h3 class="mt-4">Available Books</h3>

<table class="table table-bordered table-striped mt-3">

<thead class="table-dark">

<tr>
<th>ID</th>
<th>Title</th>
<th>Author</th>
<th>Quantity</th>
</tr>

</thead>

<tbody id="booksTable"></tbody>

</table>

</div>

<script>

function loadBooks() {

fetch("/books")
.then(res => res.json())
.then(data => {

let rows = "";

data.forEach(book => {

rows += `
<tr>
<td>${book.id}</td>
<td>${book.title}</td>
<td>${book.author}</td>
<td>${book.quantity}</td>
</tr>
`;

});

document.getElementById("booksTable").innerHTML = rows;

});

}

function issueBook() {

let id = document.getElementById("bookId").value;

fetch(`/books/issue/${id}`,{
method:"PUT"
})
.then(()=>loadBooks());

}

function returnBook() {

let id = document.getElementById("bookId").value;

fetch(`/books/return/${id}`,{
method:"PUT"
})
.then(()=>loadBooks());

}

</script>

</body>
</html>
