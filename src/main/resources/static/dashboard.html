<!DOCTYPE html>
<html>
<head>
<title>Library Management System</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

<h1 class="text-center text-primary mb-4">Library Management System</h1>

<div class="card p-4 shadow">

<div class="row mb-3">

<div class="col-md-3">
<button class="btn btn-success w-100" onclick="loadBooks()">Show Books</button>
</div>

<div class="col-md-3">
<input type="number" id="bookId" class="form-control" placeholder="Book ID">
</div>

<div class="col-md-3">
<button class="btn btn-warning w-100" onclick="issueBook()">Issue Book</button>
</div>

<div class="col-md-3">
<button class="btn btn-info w-100" onclick="returnBook()">Return Book</button>
</div>

</div>

</div>

<!-- Available Books -->
<h3 class="mt-4" id="availableTitle" style="display:none">Available Books</h3>

<table id="availableTable" class="table table-bordered table-striped mt-3" style="display:none">
<thead class="table-dark">
<tr>
<th>ID</th>
<th>Title</th>
<th>Author</th>
<th>Quantity</th>
</tr>
</thead>
<tbody id="booksTable"></tbody>
</table>

<!-- Issued Books -->
<h3 class="mt-4" id="issuedTitle" style="display:none">Issued Books</h3>

<table id="issuedTableMain" class="table table-bordered table-striped mt-3" style="display:none">
<thead class="table-dark">
<tr>
<th>Record ID</th>
<th>Book Title</th>
<th>Student USN</th>
<th>Issue Time</th>
<th>Return Time</th>
</tr>
</thead>
<tbody id="issuedTable"></tbody>
</table>

</div>

<script>

// 🔥 SHOW AVAILABLE BOOKS
function loadBooks() {

    document.getElementById("availableTable").style.display = "table";
    document.getElementById("availableTitle").style.display = "block";

    document.getElementById("issuedTableMain").style.display = "none";
    document.getElementById("issuedTitle").style.display = "none";

    fetch("/books")
    .then(res => res.json())
    .then(data => {

        let rows = "";

        data.forEach(book => {
            rows += `
            <tr>
            <td>${book.id}</td>
            <td>${book.title}</td>
            <td>${book.author}</td>
            <td>${book.quantity}</td>
            </tr>
            `;
        });

        document.getElementById("booksTable").innerHTML = rows;
    });
}


// 🔥 SHOW ISSUED BOOKS
function loadIssuedBooks() {

    document.getElementById("issuedTableMain").style.display = "table";
    document.getElementById("issuedTitle").style.display = "block";

    document.getElementById("availableTable").style.display = "none";
    document.getElementById("availableTitle").style.display = "none";

    fetch("/books/issued")
    .then(res => res.json())
    .then(data => {

        let rows = "";

        data.forEach(record => {

            rows += `
            <tr>
            <td>${record.id}</td>
            <td>${record.book ? record.book.title : "N/A"}</td>
            <td>${record.usn || "N/A"}</td>
            <td>${record.issueDate}</td>
            <td>${record.returnDate ? record.returnDate : "Not Returned"}</td>
            </tr>
            `;
        });

        document.getElementById("issuedTable").innerHTML = rows;
    });
}


// 🔥 ISSUE BOOK
function issueBook() {

    let id = document.getElementById("bookId").value;
    let usn = localStorage.getItem("usn");

    if(!id || !usn){
        alert("Enter Book ID and login first!");
        return;
    }

    fetch(`/books/issue/${id}/${usn}`, {
        method: "PUT"
    })
    .then(() => {
        loadIssuedBooks();   // ✅ ONLY issued table
    });
}


// 🔥 RETURN BOOK
function returnBook() {

    let recordId = document.getElementById("bookId").value;

    if(!recordId){
        alert("Enter Record ID!");
        return;
    }

    fetch(`/books/return/${recordId}`,{
        method:"PUT"
    })
    .then(()=>{
        loadIssuedBooks();   // ✅ ONLY issued table
    });
}

</script>

</body>
</html>
